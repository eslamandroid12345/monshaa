<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>العقود المنتهيه</title>

  <!-- Bootstrap RTL -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --topbar: #3f5564;
      --thead: #5c87a6;
      --panel-border: #cfd6dd;
      --shadow: 0 8px 24px rgba(0, 0, 0, .08);
    }

    body {
      background: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial;
      height: 100vh;
      overflow: hidden;
      margin: 0;
    }

    /* ===== Topbar ===== */
    .app-topbar {
      height: 52px;
      background: var(--topbar);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .app-topbar .title {
      flex: 1;
      text-align: center;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .app-topbar .icon-btn {
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      color: #eaf1f7;
      display: grid;
      place-items: center;
      border-radius: 8px;
      transition: .2s;
    }

    .app-topbar .icon-btn:hover {
      background: rgba(255, 255, 255, .10);
    }

    /* ===== Table wrapper ===== */
    .table-wrap {
      height: calc(100vh - 52px);
      background: #fff;
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      overflow: auto;
      position: relative;
    }

    table.exp {
      width: 100%;
      border-collapse: collapse;
    }

    table.exp thead th {
      position: sticky;
      top: 0;
      z-index: 3;
      background: var(--thead);
      color: #fff;
      font-weight: 700;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0, 0, 0, .10);
      white-space: nowrap;
      text-align: center;
    }

    table.exp tbody td {
      padding: 16px 12px;
      border-bottom: 1px solid #e9eef2;
      vertical-align: middle;
      white-space: nowrap;
      text-align: center;
    }

    table.exp tbody tr:hover {
      background: #fafcff;
    }

    /* ===== Empty State (Clean Version) ===== */
    .empty-state {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      z-index: 1;
    }

    .empty-box {
      text-align: center;
    }

    .empty-box img {
      width: min(420px, 65%);
      height: auto;
      opacity: .95;
      user-select: none;
      -webkit-user-drag: none;
    }

    .empty-title {
      margin-top: 10px;
      font-weight: 700;
      color: #5a6b7a;
      font-size: 16px;
    }

    .empty-sub {
      margin: 4px 0 0;
      color: #8b98a6;
      font-size: 12px;
    }

    /* Responsive */
    @media (max-width: 900px) {
      body { overflow: auto; }
      .table-wrap { height: auto; min-height: calc(100vh - 52px); }
      .empty-state { position: relative; inset: auto; padding: 40px 0; }
    }
  </style>
</head>

<body>

  <!-- Top bar -->
  <div class="app-topbar">
    <button class="icon-btn" type="button" title="بحث">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>

    <button class="icon-btn" type="button" title="تحديث" id="refreshBtn">
      <i class="fa-solid fa-rotate-right"></i>
    </button>

    <div class="title">العقود المنتهيه</div>

    <button class="icon-btn" type="button" title="رجوع" onclick="history.back()">
      <i class="fa-solid fa-right-long"></i>
    </button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table class="exp">
      <thead>
        <tr>
          <th>عنوان العقار</th>
          <th>المالك</th>
          <th>هاتف المالك</th>
          <th>المستأجر</th>
          <th>هاتف المستأجر</th>
          <th>قيمة الإيجار</th>
          <th>تاريخ الانتهاء</th>
          <th>حذف</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="empty-box">
        <img src="undraw_no-data_ig65.png" alt="No Data Available">
        <div class="empty-title">لا توجد بيانات</div>
        <div class="empty-sub">عند إضافة عقود منتهية ستظهر هنا تلقائياً</div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("refreshBtn").addEventListener("click", () => location.reload());

    const tbody = document.querySelector("table.exp tbody");
    const emptyState = document.getElementById("emptyState");

    function toggleEmpty() {
      emptyState.style.display = tbody.children.length ? "none" : "grid";
    }

    toggleEmpty();
  </script>
</body>

</html>
