<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تقرير العقارات</title>

  <!-- Bootstrap RTL -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --topbar: #3f5564;
      --thead: #5c87a6;
      --border: #cfd6dd;
      --shadow: 0 8px 24px rgba(0, 0, 0, .08);
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial;
    }

    /* ===== Topbar ===== */
    .app-topbar {
      height: 52px;
      background: var(--topbar);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .app-topbar .title {
      flex: 1;
      text-align: center;
      font-weight: 700;
    }

    .app-topbar .icon-btn {
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      color: #eaf1f7;
      display: grid;
      place-items: center;
      border-radius: 8px;
      transition: .2s;
    }

    .app-topbar .icon-btn:hover {
      background: rgba(255, 255, 255, .10);
    }

    /* ===== Table Layout ===== */
    .table-wrap {
      height: calc(100vh - 52px);
      overflow: auto;
      border-top: 1px solid var(--border);
    }

    table.report-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1400px;
    }

    table.report-table thead th {
      position: sticky;
      top: 0;
      background: var(--thead);
      color: #fff;
      font-weight: 700;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0, 0, 0, .1);
      white-space: nowrap;
      text-align: center;
    }

    table.report-table tbody td {
      padding: 14px 12px;
      border-bottom: 1px solid #e9eef2;
      white-space: nowrap;
      text-align: center;
    }

    table.report-table tbody tr:hover {
      background: #fafcff;
    }
  </style>
</head>

<body>

  <!-- Topbar -->
  <div class="app-topbar">

    <button class="icon-btn" title="بحث">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>

    <button class="icon-btn" id="refreshBtn" title="تحديث">
      <i class="fa-solid fa-rotate-right"></i>
    </button>

    <div class="title">العقارات</div>

   <button class="icon-btn" type="button" title="خروج">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>

  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table class="report-table">
      <thead>
        <tr>
          <th>اسم الموظف</th>
          <th>العنوان</th>
          <th>القسم</th>
          <th>السعر</th>
          <th>النوع</th>
          <th>اسم المعاين</th>
          <th>هاتف المعاين</th>
          <th>نوع المعاين</th>
          <th>المساحة</th>
          <th>التاريخ</th>
        </tr>
      </thead>

      <tbody>
        <!-- صف تجريبي مطابق للصورة -->
        <tr>
          <td>محمد حسن</td>
          <td>التجمع الخامس</td>
          <td>ايجار</td>
          <td>10000</td>
          <td>شقه فارغه</td>
          <td>محمد حسن</td>
          <td dir="ltr">01063099877</td>
          <td>صاحب عقار</td>
          <td>120</td>
          <td>2024-05-04</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    document.getElementById("refreshBtn").addEventListener("click", () => location.reload());
  </script>

</body>
</html>
