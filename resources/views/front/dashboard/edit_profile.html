<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تعديل الملف الشخصي</title>

  <!-- Bootstrap RTL -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root{
      --topbar:#3f5564;
      --line:#8fc0ff;
      --muted:#6b7785;
      --btn:#5c87a6;
      --btn-hover:#4f7691;
    }

    body{
      margin:0;
      height:100vh;
      overflow:hidden;
      background:#fff;
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial;
    }

    /* ===== Topbar ===== */
    .app-topbar{
      height:52px;
      background:var(--topbar);
      color:#fff;
      display:flex;
      align-items:center;
      padding:0 14px;
      gap:10px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .app-topbar .title{
      flex:1;
      text-align:center;
      font-weight:700;
      letter-spacing:.2px;
    }
    .app-topbar .icon-btn{
      width:34px;height:34px;
      border:0;background:transparent;
      color:#eaf1f7;
      display:grid;place-items:center;
      border-radius:8px;
      transition:.2s;
    }
    .app-topbar .icon-btn:hover{ background:rgba(255,255,255,.10); }

    /* ===== Page ===== */
    .page{
      height:calc(100vh - 52px);
      overflow:auto;
      padding:28px 12px 40px;
    }

    .wrap{
      width:min(720px, 100%);
      margin:0 auto;
      position:relative;
    }

    /* vertical separator (زي الصورة) */
    .vline{
      position:absolute;
      top:90px;
      right: -36px;
      width:6px;
      height:520px;
      background:#e5e7eb;
      border-radius:999px;
      opacity:.75;
    }

    /* ===== Avatar ===== */
    .avatar-area{
      display:flex;
      justify-content:center;
      margin-top:8px;
      margin-bottom:18px;
    }

    .avatar-ring{
      width:120px;height:120px;
      border-radius:999px;
      border:2px solid var(--line);
      display:grid;
      place-items:center;
      position:relative;
      background:#fff;
    }

    .avatar{
      width:92px;height:92px;
      border-radius:999px;
      overflow:hidden;
      display:grid;
      place-items:center;
      background:#fff;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .cam-btn{
      position:absolute;
      bottom:10px;
      left:8px;
      width:26px;height:26px;
      border-radius:6px;
      background:#fff;
      border:1px solid #d1d5db;
      display:grid;
      place-items:center;
      color:#0f172a;
      cursor:pointer;
      box-shadow:0 6px 14px rgba(0,0,0,.08);
    }
    .cam-btn:hover{ background:#f8fafc; }

    /* ===== Form ===== */
    .field{
      margin-bottom:12px;
    }
    .field label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
      text-align:right;
      font-weight:600;
    }
    .form-control.custom{
      border:1px solid var(--line);
      border-radius:2px;
      padding:10px 12px;
      box-shadow:none !important;
      height:44px;
      font-size:13px;
    }
    .form-control.custom:focus{
      border-color:#5aa5ff;
      box-shadow:0 0 0 .2rem rgba(90,165,255,.15) !important;
    }

    .btn-save{
      margin-top:12px;
      width:100%;
      height:48px;
      border:0;
      border-radius:4px;
      background:var(--btn);
      color:#fff;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      transition:.2s;
    }
    .btn-save:hover{ background:var(--btn-hover); }

    /* responsive */
    @media (max-width: 900px){
      .vline{ display:none; }
    }
  </style>
</head>

<body>

  <!-- Topbar -->
  <div class="app-topbar">
    <button class="icon-btn" title="رجوع" onclick="history.back()">
      <i class="fa-solid fa-right-long"></i>
    </button>


    <div class="title">تعديل الملف الشخصي</div>

    <button class="icon-btn" title="رجوع" onclick="history.back()">
      <i class="fa-solid fa-right-long"></i>
    </button>
  </div>

  <div class="page">
    <div class="wrap">

      <div class="vline"></div>

      <!-- Avatar -->
      <div class="avatar-area">
        <div class="avatar-ring">
          <div class="avatar" id="avatarBox">
            <!-- حط لوجو شركتك هنا -->
            <img id="avatarImg" src="logo.png" alt="logo"
              onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=&quot;fa-solid fa-building-columns&quot; style=&quot;font-size:34px;color:#2d8bd6&quot;></i>';">
          </div>

          <label class="cam-btn" for="avatarInput" title="تغيير الصورة">
            <i class="fa-solid fa-camera"></i>
          </label>
          <input id="avatarInput" type="file" accept="image/*" hidden>
        </div>
      </div>

      <!-- Form -->
      <form action="#" method="post" autocomplete="off">

        <div class="field">
          <label>الاسم</label>
          <input class="form-control custom" type="text" value="اسلام محمد" placeholder="الاسم">
        </div>

        <div class="field">
          <label>الهاتف</label>
          <input class="form-control custom" type="text" value="01062933199" placeholder="الهاتف">
        </div>

        <div class="field">
          <label>اسم الشركة</label>
          <input class="form-control custom" type="text" value="نمم العقاريه" placeholder="اسم الشركة">
        </div>

        <div class="field">
          <label>هاتف الشركة</label>
          <input class="form-control custom" type="text" value="01062933144" placeholder="هاتف الشركة">
        </div>

        <div class="field">
          <label>عنوان الشركة</label>
          <input class="form-control custom" type="text" value="المملكة العربية السعوديه" placeholder="عنوان الشركة">
        </div>

        <div class="field">
          <label>العمله</label>
          <input class="form-control custom" type="text" value="جنيه مصري" placeholder="العملة">
        </div>

        <div class="field">
          <label>كلمة المرور القديمه</label>
          <input class="form-control custom" type="password" placeholder="">
        </div>

        <div class="field">
          <label>كلمة المرور الجديده</label>
          <input class="form-control custom" type="password" placeholder="">
        </div>

        <button class="btn-save" type="submit">
          <i class="fa-solid fa-pen"></i>
          تعديل البيانات
        </button>
      </form>

    </div>
  </div>

  <script>
    // Preview uploaded logo/avatar (اختياري)
    const input = document.getElementById("avatarInput");
    const img = document.getElementById("avatarImg");

    input.addEventListener("change", (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const url = URL.createObjectURL(file);

      // لو كان img اتشال بسبب onerror، نرجعه
      const box = document.getElementById("avatarBox");
      box.innerHTML = '<img id="avatarImg" style="width:100%;height:100%;object-fit:contain;display:block;" alt="logo">';
      const newImg = box.querySelector("#avatarImg");
      newImg.src = url;
    });
  </script>

</body>
</html>
