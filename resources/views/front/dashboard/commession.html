<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>عمولة الموظفين</title>

  <!-- Bootstrap RTL -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --topbar: #3f5564;
      --thead: #5c87a6;
      --panel-border: #cfd6dd;
      --panel-bg: #ffffff;
      --muted: #7a8793;

      --btn: #5c87a6;
      --btn-hover: #4f7691;

      --input-border: #8fc0ff;
      --dropdown-bg: #f2f3f5;
      --shadow: 0 8px 24px rgba(0, 0, 0, .08);
    }

    body {
      background: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== Topbar ===== */
    .app-topbar {
      height: 52px;
      background: var(--topbar);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .app-topbar .title {
      flex: 1;
      text-align: center;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .app-topbar .icon-btn {
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      color: #eaf1f7;
      display: grid;
      place-items: center;
      border-radius: 8px;
      transition: .2s;
    }

    .app-topbar .icon-btn:hover {
      background: rgba(255, 255, 255, .10);
    }

    /* ===== Layout ===== */
    .app {
      height: calc(100vh - 52px);
      display: grid;
      grid-template-columns: 460px 1fr;
      grid-template-areas: "panel table";
      gap: 14px;
      padding: 12px;
    }

    .panel {
      grid-area: panel;
    }

    .table-wrap {
      grid-area: table;
    }

    /* ===== Table ===== */
    .table-wrap {
      background: #fff;
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      overflow: auto;
      position: relative;
      padding-bottom: 48px; /* مساحة للـ total bar */
    }

    table.commissions {
      width: 100%;
      border-collapse: collapse;
    }

    table.commissions thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--thead);
      color: #fff;
      font-weight: 700;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0, 0, 0, .10);
      white-space: nowrap;
    }

    table.commissions tbody td {
      padding: 16px 12px;
      border-bottom: 1px solid #e9eef2;
      vertical-align: middle;
      white-space: nowrap;
    }

    table.commissions tbody tr:hover {
      background: #fafcff;
    }

    .t-action {
      width: 90px;
      text-align: center;
    }

    .t-action i {
      cursor: pointer;
      opacity: .85;
      transition: .15s;
    }

    .t-action i:hover {
      opacity: 1;
      transform: translateY(-1px);
    }

    /* Total bar */
    .total-bar{
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: 1px solid #e9eef2;
      background: #fff;
      font-weight: 700;
      color: #3f5564;
    }

    /* ===== Panel ===== */
    .panel {
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      box-shadow: var(--shadow);
      padding: 16px 16px 14px;
      overflow: auto;
    }

    .panel-head {
      text-align: center;
      padding-top: 8px;
      padding-bottom: 6px;
    }

    .panel-head .people {
      font-size: 44px;
      color: #5a6b7a;
      margin-bottom: 6px;
    }

    .panel-head .panel-title {
      color: #2d8bd6;
      font-weight: 700;
      font-size: 16px;
      margin: 0;
    }

    .form-label {
      font-size: 13px;
      color: #6b7785;
      margin-top: 10px;
      margin-bottom: 6px;
    }

    .form-control,
    .form-select {
      border: 1px solid var(--input-border);
      border-radius: 2px;
      padding: 10px 12px;
      box-shadow: none !important;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: #5aa5ff;
      box-shadow: 0 0 0 .2rem rgba(90, 165, 255, .15) !important;
    }

    .dropdown-status {
      border: 1px solid var(--input-border);
      border-radius: 2px;
      background: #fff;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .dropdown-menu.status-menu {
      width: 100%;
      border-radius: 0;
      padding: 0;
      border: 1px solid #d7dee6;
      background: var(--dropdown-bg);
    }

    .status-menu .dropdown-item {
      text-align: center;
      padding: 12px 10px;
      font-weight: 600;
      border-bottom: 1px solid #e1e6eb;
      background: transparent;
    }

    .status-menu .dropdown-item:last-child {
      border-bottom: 0;
    }

    .status-menu .dropdown-item:hover {
      background: #e7eef6;
    }

    .btn-save {
      background: var(--btn);
      border: 0;
      color: #fff;
      width: 100%;
      padding: 12px 14px;
      border-radius: 4px;
      font-weight: 700;
      margin-top: 12px;
      transition: .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-save:hover {
      background: var(--btn-hover);
    }

    /* ===== Mobile ===== */
    .fab-add {
      position: fixed;
      left: 16px;
      bottom: 16px;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 0;
      background: var(--btn);
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 30px rgba(0,0,0,.18);
      z-index: 1055;
      transition: .2s;
    }
    .fab-add:hover { background: var(--btn-hover); }

    .search-modal { background: transparent; border: 0; box-shadow: none; }
    .panel-modal {
      border: 2px solid var(--panel-border);
      box-shadow: var(--shadow);
      border-radius: 6px;
      background: var(--panel-bg);
      padding: 16px 16px 14px;
    }
    .modal-backdrop.show { opacity: .35; }

    @media (max-width: 1100px) {
      body { overflow: auto; }

      .app {
        height: auto;
        grid-template-columns: 1fr;
        grid-template-areas: "table";
      }

      .panel { display: none; }
      .fab-add { display: flex; }
    }
  </style>
</head>

<body>

  <!-- Top bar -->
  <div class="app-topbar">
    <button class="icon-btn" id="searchBtn" type="button" title="بحث">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>

    <button class="icon-btn" type="button" title="تحديث" id="refreshBtn">
      <i class="fa-solid fa-rotate-right"></i>
    </button>

    <div class="title">عمولة الموظفين</div>

    <button class="icon-btn" type="button" title="خروج">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>
  </div>

  <div class="app">

    <!-- Table -->
    <div class="table-wrap">
      <table class="commissions">
        <thead>
          <tr>
            <th style="width: 220px;">اسم الموظف</th>
            <th style="width: 160px;">المبلغ</th>
            <th style="width: 260px;">الوصف</th>
            <th style="width: 160px;">التاريخ</th>
            <th class="t-action">تعديل</th>
            <th class="t-action">حذف</th>
          </tr>
        </thead>

        <tbody id="commBody">
          <tr>
            <td>محمد حسن</td>
            <td class="amount">6000</td>
            <td>عمولة عقد بيع</td>
            <td>2024-05-11</td>
            <td class="t-action"><i class="fa-solid fa-pen-to-square"></i></td>
            <td class="t-action"><i class="fa-solid fa-trash text-danger"></i></td>
          </tr>

          <tr>
            <td>محمد حسن</td>
            <td class="amount">5000</td>
            <td>عمولة عقد بيع</td>
            <td>2024-05-04</td>
            <td class="t-action"><i class="fa-solid fa-pen-to-square"></i></td>
            <td class="t-action"><i class="fa-solid fa-trash text-danger"></i></td>
          </tr>
        </tbody>
      </table>

      <div class="total-bar">
        الإجمالي : <span id="totalVal" style="margin-right:6px;">0</span>
      </div>
    </div>

    <!-- Create panel (Desktop) -->
    <div class="panel" id="createPanelDesktop">
      <div class="panel-head">
        <div class="people"><i class="fa-solid fa-coins"></i></div>
        <p class="panel-title">تسجيل عمولة الموظفين</p>
      </div>

      <div class="mb-2">
        <label class="form-label">اسم الموظف</label>
        <select id="empName" class="form-select">
          <option value="" selected disabled>اسم الموظف</option>
          <option>محمد حسن</option>
          <option>أحمد السيد</option>
          <option>سارة محمود</option>
        </select>
      </div>

      <div class="mb-2">
        <label class="form-label">المبلغ</label>
        <input id="amount" class="form-control" type="number" style="direction: rtl;" placeholder="المبلغ">
      </div>

      <div class="mb-2">
        <label class="form-label">الوصف</label>
        <div class="dropdown w-100">
          <div class="dropdown-status" data-bs-toggle="dropdown" aria-expanded="false">
            <span id="descText" class="text-muted">الوصف</span>
            <i class="fa-solid fa-caret-down text-muted"></i>
          </div>
          <ul class="dropdown-menu status-menu w-100">
            <li><button class="dropdown-item" type="button" data-desc="عمولة عقد بيع">عمولة عقد بيع</button></li>
            <li><button class="dropdown-item" type="button" data-desc="عمولة عقد إيجار">عمولة عقد إيجار</button></li>
            <li><button class="dropdown-item" type="button" data-desc="عمولة تسويق">عمولة تسويق</button></li>
          </ul>
        </div>
      </div>

      <div class="mb-2">
        <label class="form-label">عنوان العقار</label>
        <input id="propAddress" class="form-control" type="text" placeholder="عنوان العقار">
      </div>

      <div class="mb-2">
        <label class="form-label">اسم المالك</label>
        <input id="ownerName" class="form-control" type="text" placeholder="اسم المالك">
      </div>

      <div class="mb-2">
        <label class="form-label">التاريخ</label>
        <input id="date" class="form-control" type="date">
      </div>

      <button class="btn-save" id="saveBtn" type="button">
        <i class="fa-solid fa-left-long"></i>
        تسجيل البيانات
      </button>
    </div>

  </div>

  <!-- Floating + button (mobile) -->
  <button class="fab-add" id="openCreateModalBtn" type="button" title="إضافة عمولة">
    <i class="fa-solid fa-plus"></i>
  </button>

  <!-- Create Modal (Mobile) -->
  <div class="modal fade" id="createModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 520px;">
      <div class="modal-content search-modal">
        <div class="modal-body p-0">
          <div class="panel-modal">
            <div class="panel-head">
              <div class="people"><i class="fa-solid fa-coins"></i></div>
              <p class="panel-title">تسجيل عمولة الموظفين</p>
            </div>

            <div class="mb-2">
              <label class="form-label">اسم الموظف</label>
              <select id="m_empName" class="form-select">
                <option value="" selected disabled>اسم الموظف</option>
                <option>محمد حسن</option>
                <option>أحمد السيد</option>
                <option>سارة محمود</option>
              </select>
            </div>

            <div class="mb-2">
              <label class="form-label">المبلغ</label>
              <input id="m_amount" class="form-control" type="number" placeholder="المبلغ">
            </div>

            <div class="mb-2">
              <label class="form-label">الوصف</label>
              <div class="dropdown w-100">
                <div class="dropdown-status" data-bs-toggle="dropdown" aria-expanded="false">
                  <span id="m_descText" class="text-muted">الوصف</span>
                  <i class="fa-solid fa-caret-down text-muted"></i>
                </div>
                <ul class="dropdown-menu status-menu w-100">
                  <li><button class="dropdown-item" type="button" data-m-desc="عمولة عقد بيع">عمولة عقد بيع</button></li>
                  <li><button class="dropdown-item" type="button" data-m-desc="عمولة عقد إيجار">عمولة عقد إيجار</button></li>
                  <li><button class="dropdown-item" type="button" data-m-desc="عمولة تسويق">عمولة تسويق</button></li>
                </ul>
              </div>
            </div>

            <div class="mb-2">
              <label class="form-label">عنوان العقار</label>
              <input id="m_propAddress" class="form-control" type="text" placeholder="عنوان العقار">
            </div>

            <div class="mb-2">
              <label class="form-label">اسم المالك</label>
              <input id="m_ownerName" class="form-control" type="text" placeholder="اسم المالك">
            </div>

            <div class="mb-2">
              <label class="form-label">التاريخ</label>
              <input id="m_date" class="form-control" type="date">
            </div>

            <button class="btn-save" id="m_saveBtn" type="button">
              <i class="fa-solid fa-left-long"></i>
              تسجيل البيانات
            </button>

            <button type="button" class="btn btn-link mt-3 w-100" data-bs-dismiss="modal"
              style="text-decoration:none;color:#6b7785;">
              إغلاق
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Search Modal -->
  <div class="modal fade" id="searchModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 520px;">
      <div class="modal-content search-modal">
        <div class="modal-body p-0">
          <div class="panel-modal">
            <div class="panel-head">
              <div class="people"><i class="fa-solid fa-magnifying-glass"></i></div>
              <p class="panel-title">بحث عمولة الموظفين</p>
            </div>

            <div class="mb-2">
              <label class="form-label">اسم الموظف</label>
              <input id="s_emp" class="form-control" type="text">
            </div>

            <div class="mb-2">
              <label class="form-label">من تاريخ</label>
              <input id="s_from" class="form-control" type="date">
            </div>

            <div class="mb-2">
              <label class="form-label">إلى تاريخ</label>
              <input id="s_to" class="form-control" type="date">
            </div>

            <div class="d-flex gap-2 mt-3">
              <button class="btn-save flex-grow-1" id="doSearchBtn" type="button">
                <i class="fa-solid fa-magnifying-glass"></i>
                بحث
              </button>
            </div>

            <button type="button" class="btn btn-link mt-3 w-100" data-bs-dismiss="modal"
              style="text-decoration:none;color:#6b7785;">
              إغلاق
            </button>

          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ===== Total calc (static demo) =====
    function calcTotal(){
      let total = 0;
      document.querySelectorAll(".amount").forEach(td=>{
        const v = Number(td.textContent.trim()) || 0;
        total += v;
      });
      document.getElementById("totalVal").textContent = total;
    }
    calcTotal();

    // ===== Modals =====
    const searchModal = new bootstrap.Modal(document.getElementById("searchModal"));
    const createModal = new bootstrap.Modal(document.getElementById("createModal"));

    document.getElementById("searchBtn").addEventListener("click", () => searchModal.show());

    document.getElementById("openCreateModalBtn").addEventListener("click", () => {
      // reset
      document.getElementById("m_empName").value = "";
      document.getElementById("m_amount").value = "";
      document.getElementById("m_propAddress").value = "";
      document.getElementById("m_ownerName").value = "";
      document.getElementById("m_date").value = "";
      document.getElementById("m_descText").textContent = "الوصف";
      document.getElementById("m_descText").classList.add("text-muted");
      createModal.show();
    });

    // Desktop desc dropdown
    document.querySelectorAll("[data-desc]").forEach(btn => {
      btn.addEventListener("click", () => {
        const el = document.getElementById("descText");
        el.textContent = btn.getAttribute("data-desc");
        el.classList.remove("text-muted");
      });
    });

    // Mobile desc dropdown
    document.querySelectorAll("[data-m-desc]").forEach(btn => {
      btn.addEventListener("click", () => {
        const el = document.getElementById("m_descText");
        el.textContent = btn.getAttribute("data-m-desc");
        el.classList.remove("text-muted");
      });
    });

    // Search (demo)
    document.getElementById("doSearchBtn").addEventListener("click", () => {
      searchModal.hide();
    });

    // Save (demo)
    document.getElementById("saveBtn").addEventListener("click", () => {
      alert("تم حفظ العمولة (Demo). لو عايز تضاف فعلياً للجدول قولّي وأعملها لك.");
    });

    document.getElementById("m_saveBtn").addEventListener("click", () => {
      alert("تم حفظ العمولة (Demo). لو عايز تضاف فعلياً للجدول قولّي وأعملها لك.");
      createModal.hide();
    });

    // Refresh
    document.getElementById("refreshBtn").addEventListener("click", () => location.reload());
  </script>
</body>

</html>
