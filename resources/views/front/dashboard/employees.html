<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>الموظفين</title>

  <!-- Bootstrap RTL -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --topbar: #3f5564;
      --thead: #5c87a6;
      --panel-border: #cfd6dd;
      --panel-bg: #ffffff;

      --btn: #5c87a6;
      --btn-hover: #4f7691;

      --input-border: #8fc0ff;
      --shadow: 0 8px 24px rgba(0, 0, 0, .08);
      --muted: #7a8793;
    }

    body {
      background: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== Topbar ===== */
    .app-topbar {
      height: 52px;
      background: var(--topbar);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .app-topbar .title {
      flex: 1;
      text-align: center;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .app-topbar .icon-btn {
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      color: #eaf1f7;
      display: grid;
      place-items: center;
      border-radius: 8px;
      transition: .2s;
    }

    .app-topbar .icon-btn:hover {
      background: rgba(255, 255, 255, .10);
    }

    /* ===== Layout ===== */
    .app {
      height: calc(100vh - 52px);
      display: grid;
      grid-template-columns: 460px 1fr;
      grid-template-areas: "panel table";
      gap: 14px;
      padding: 12px;
    }

    .panel {
      grid-area: panel;
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      box-shadow: var(--shadow);
      padding: 16px 16px 14px;
      overflow: auto;
    }

    .table-wrap {
      grid-area: table;
      background: #fff;
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      overflow: auto;
    }

    /* ===== Table ===== */
    table.emps {
      width: 100%;
      border-collapse: collapse;
    }

    table.emps thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--thead);
      color: #fff;
      font-weight: 700;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0, 0, 0, .10);
      white-space: nowrap;
    }

    table.emps tbody td {
      padding: 16px 12px;
      border-bottom: 1px solid #e9eef2;
      vertical-align: middle;
      white-space: nowrap;
    }

    table.emps tbody tr:hover {
      background: #fafcff;
    }

    .t-action {
      width: 90px;
      text-align: center;
    }

    .t-action i {
      cursor: pointer;
      opacity: .85;
      transition: .15s;
    }

    .t-action i:hover {
      opacity: 1;
      transform: translateY(-1px);
    }

    /* ===== Panel header ===== */
    .panel-head {
      text-align: center;
      padding-top: 8px;
      padding-bottom: 10px;
    }

    .panel-head .icon {
      font-size: 44px;
      color: #5a6b7a;
      margin-bottom: 6px;
    }

    .panel-head .panel-title {
      color: #2d8bd6;
      font-weight: 700;
      font-size: 16px;
      margin: 0;
    }

    .form-label {
      font-size: 13px;
      color: #6b7785;
      margin-top: 10px;
      margin-bottom: 6px;
    }

    .form-control {
      border: 1px solid var(--input-border);
      border-radius: 2px;
      padding: 10px 12px;
      box-shadow: none !important;
    }

    .form-control:focus {
      border-color: #5aa5ff;
      box-shadow: 0 0 0 .2rem rgba(90, 165, 255, .15) !important;
    }

    /* ===== Permissions Dropdown ===== */
    .perm-wrap {
      position: relative;
    }

    .perm-trigger {
      width: 100%;
      border: 1px solid var(--input-border);
      border-radius: 2px;
      padding: 10px 12px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .perm-trigger .placeholder {
      color: var(--muted);
      font-size: 13px;
    }

    .perm-trigger i {
      color: var(--muted);
    }

    .perm-panel {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 6px);
      background: #f2f4f7;
      border: 1px solid #d7dee6;
      box-shadow: 0 10px 28px rgba(0, 0, 0, .12);
      max-height: 360px;
      overflow: auto;
      z-index: 50;
      display: none;
      padding-bottom: 10px;
    }

    .perm-panel.open { display: block; }

    .perm-item {
      display: grid;
      grid-template-columns: 1fr 24px;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid #e1e6eb;
      background: transparent;
      font-weight: 600;
      font-size: 13px;
      color: #2c3e50;
      cursor: pointer;
    }

    .perm-item:last-child { border-bottom: 0; }

    .perm-item input {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .perm-footer {
      position: sticky;
      bottom: 0;
      background: #f2f4f7;
      padding: 10px 12px;
      border-top: 1px solid #e1e6eb;
      display: flex;
      gap: 8px;
    }

    .perm-btn {
      border: 0;
      border-radius: 4px;
      padding: 10px 12px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      flex: 1;
    }

    .perm-btn.done {
      background: var(--btn);
      color: #fff;
    }

    .perm-btn.done:hover { background: var(--btn-hover); }

    .perm-btn.clear {
      background: #fff;
      border: 1px solid #cfd6dd;
      color: #3f5564;
    }

    .perm-btn.clear:hover { background: #f8fafc; }

    .btn-save {
      background: var(--btn);
      border: 0;
      color: #fff;
      width: 100%;
      padding: 12px 14px;
      border-radius: 4px;
      font-weight: 700;
      margin-top: 12px;
      transition: .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-save:hover { background: var(--btn-hover); }

    /* ===== Responsive ===== */
    @media (max-width: 1100px) {
      body { overflow: auto; }
      .app {
        height: auto;
        grid-template-columns: 1fr;
        grid-template-areas: "table";
      }
      .panel { display: none; }
    }
  </style>
</head>

<body>

  <!-- Top bar -->
  <div class="app-topbar">
    <button class="icon-btn" type="button" title="بحث">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>

    <button class="icon-btn" type="button" title="تحديث" id="refreshBtn">
      <i class="fa-solid fa-rotate-right"></i>
    </button>

    <div class="title">الموظفين</div>

    <button class="icon-btn" type="button" title="خروج">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>
  </div>

  <div class="app">

    <!-- Table -->
    <div class="table-wrap">
      <table class="emps">
        <thead>
          <tr>
            <th style="width: 220px;">اسم الموظف</th>
            <th style="width: 220px;">العنوان</th>
            <th style="width: 220px;">الوظيفه</th>
            <th style="width: 200px;">رقم الهاتف</th>
            <th class="t-action">تعديل</th>
            <th class="t-action">حذف</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>محمد حسن</td>
            <td>منوف</td>
            <td>مدير مبيعات</td>
            <td dir="ltr">01062933177</td>
            <td class="t-action"><i class="fa-solid fa-pen-to-square"></i></td>
            <td class="t-action"><i class="fa-solid fa-trash text-danger"></i></td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Right panel -->
    <div class="panel">
      <div class="panel-head">
        <div class="icon"><i class="fa-solid fa-people-group"></i></div>
        <p class="panel-title">تسجيل الموظفين</p>
      </div>

      <div class="mb-2">
        <label class="form-label">اسم الموظف</label>
        <input class="form-control">
      </div>

      <div class="mb-2">
        <label class="form-label">المسمى الوظيفي</label>
        <input class="form-control" type="text">
      </div>

      <div class="mb-2">
        <label class="form-label">العنوان</label>
        <input class="form-control" type="text">
      </div>

      <div class="mb-2">
        <label class="form-label">رقم الهاتف</label>
        <input class="form-control" type="text">
      </div>

        <div class="mb-2">
            <label class="form-label">رقم البطاقه</label>
            <input class="form-control" type="text">
        </div>

      <div class="mb-2 perm-wrap">
        <label class="form-label">الصلاحيات</label>

        <div class="perm-trigger" id="permTrigger">
          <span class="placeholder" id="permText">اختر الصلاحيات</span>
          <i class="fa-solid fa-caret-down"></i>
        </div>

        <div class="perm-panel" id="permPanel">
          <!-- نفس اللي ظاهر في الصورة -->
          <label class="perm-item"><span>العقارات</span><input type="checkbox" value="العقارات"></label>
          <label class="perm-item"><span>الاراضي</span><input type="checkbox" value="الاراضي"></label>
          <label class="perm-item"><span>المستأجرين</span><input type="checkbox" value="المستأجرين"></label>
          <label class="perm-item"><span>عقود الايجار</span><input type="checkbox" value="عقود الايجار"></label>
          <label class="perm-item"><span>سندات القبض</span><input type="checkbox" value="سندات القبض"></label>
          <label class="perm-item"><span>سندات الصرف</span><input type="checkbox" value="سندات الصرف"></label>
          <label class="perm-item"><span>المصروفات</span><input type="checkbox" value="المصروفات"></label>
          <label class="perm-item"><span>الموظفين</span><input type="checkbox" value="الموظفين"></label>
          <label class="perm-item"><span>الدعم الفني</span><input type="checkbox" value="الدعم الفني"></label>
          <label class="perm-item"><span>الإيرادات</span><input type="checkbox" value="الإيرادات"></label>
          <label class="perm-item"><span>العملاء</span><input type="checkbox" value="العملاء"></label>
          <label class="perm-item"><span>عمولة الموظفين</span><input type="checkbox" value="عمولة الموظفين"></label>
          <label class="perm-item"><span>العقود المنتهيه</span><input type="checkbox" value="العقود المنتهيه"></label>
          <label class="perm-item"><span>الارباح</span><input type="checkbox" value="الارباح"></label>

          <!-- Footer buttons -->
          <div class="perm-footer">
            <button type="button" class="perm-btn clear" id="permClear">مسح</button>
            <button type="button" class="perm-btn done" id="permDone">تم</button>
          </div>
        </div>
      </div>

        <div class="mb-2">
            <label class="form-label">كلمه السر</label>
            <input class="form-control" type="text">
        </div>

      <button class="btn-save" type="button">
        <i class="fa-solid fa-left-long"></i>
        تسجيل البيانات
      </button>
    </div>
  </div>

  <script>
    // refresh
    document.getElementById("refreshBtn").addEventListener("click", () => location.reload());

    // permissions dropdown
    const trigger = document.getElementById("permTrigger");
    const panel = document.getElementById("permPanel");
    const text = document.getElementById("permText");
    const doneBtn = document.getElementById("permDone");
    const clearBtn = document.getElementById("permClear");

    function updatePermText() {
      const selected = [...panel.querySelectorAll('input[type="checkbox"]:checked')].map(x => x.value);
      text.textContent = selected.length ? selected.join(" - ") : "اختر الصلاحيات";
      text.classList.toggle("placeholder", !selected.length);
    }

    // افتح/اقفل من الزر
    trigger.addEventListener("click", (e) => {
      panel.classList.toggle("open");
      e.stopPropagation();
    });

    // مهم جداً: أي كليك جوه الـ panel مايقفلهاش
    panel.addEventListener("click", (e) => {
      e.stopPropagation();
    });

    // اقفل بس لو ضغطت برا
    document.addEventListener("click", () => {
      panel.classList.remove("open");
    });

    // تحديث النص عند الاختيار (بدون ما تقفل)
    panel.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.addEventListener("change", updatePermText);
    });

    // زر تم
    doneBtn.addEventListener("click", () => {
      updatePermText();
      panel.classList.remove("open");
    });

    // زر مسح
    clearBtn.addEventListener("click", () => {
      panel.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      updatePermText();
    });

    // أول مرة
    updatePermText();
  </script>

</body>
</html>
