<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>سند قبض</title>

  <!-- Bootstrap RTL -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --topbar: #3f5564;
      --thead: #5c87a6;
      --panel-border: #cfd6dd;
      --panel-bg: #ffffff;

      --btn: #5c87a6;
      --btn-hover: #4f7691;

      --input-border: #8fc0ff;
      --shadow: 0 8px 24px rgba(0, 0, 0, .08);
    }

    body {
      background: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== Topbar ===== */
    .app-topbar {
      height: 52px;
      background: var(--topbar);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .app-topbar .title {
      flex: 1;
      text-align: center;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .app-topbar .icon-btn {
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      color: #eaf1f7;
      display: grid;
      place-items: center;
      border-radius: 8px;
      transition: .2s;
    }

    .app-topbar .icon-btn:hover {
      background: rgba(255, 255, 255, .10);
    }

    /* ===== Layout ===== */
    .app {
      height: calc(100vh - 52px);
      display: grid;
      grid-template-columns: 460px 1fr;
      grid-template-areas: "panel table";
      gap: 14px;
      padding: 12px;
    }

    .panel { grid-area: panel; }
    .table-wrap { grid-area: table; }

    /* ===== Table ===== */
    .table-wrap {
      background: #fff;
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      overflow: auto;
    }

    table.vouchers {
      width: 100%;
      border-collapse: collapse;
    }

    table.vouchers thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--thead);
      color: #fff;
      font-weight: 700;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0, 0, 0, .10);
      white-space: nowrap;
    }

    table.vouchers tbody td {
      padding: 16px 12px;
      border-bottom: 1px solid #e9eef2;
      vertical-align: middle;
      white-space: nowrap;
    }

    table.vouchers tbody tr:hover {
      background: #fafcff;
    }

    .t-action {
      width: 90px;
      text-align: center;
    }

    .t-action i {
      cursor: pointer;
      opacity: .85;
      transition: .15s;
      font-size: 16px;
    }

    .t-action i:hover {
      opacity: 1;
      transform: translateY(-1px);
    }

    /* ===== Panel ===== */
    .panel {
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      box-shadow: var(--shadow);
      padding: 16px 16px 14px;
      overflow: auto;
    }

    .panel-head {
      text-align: center;
      padding-top: 8px;
      padding-bottom: 6px;
    }

    .panel-head .icon {
      font-size: 44px;
      color: #5a6b7a;
      margin-bottom: 6px;
    }

    .panel-head .panel-title {
      color: #2d8bd6;
      font-weight: 700;
      font-size: 16px;
      margin: 0;
    }

    .form-label {
      font-size: 13px;
      color: #6b7785;
      margin-top: 10px;
      margin-bottom: 6px;
    }

    .form-control {
      border: 1px solid var(--input-border);
      border-radius: 2px;
      padding: 10px 12px;
      box-shadow: none !important;
    }

    .form-control:focus {
      border-color: #5aa5ff;
      box-shadow: 0 0 0 .2rem rgba(90, 165, 255, .15) !important;
    }

    .btn-save {
      background: var(--btn);
      border: 0;
      color: #fff;
      width: 100%;
      padding: 12px 14px;
      border-radius: 4px;
      font-weight: 700;
      margin-top: 12px;
      transition: .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-save:hover { background: var(--btn-hover); }

    /* ===== Responsive ===== */
    @media (max-width: 1100px) {
      body { overflow: auto; }
      .app {
        height: auto;
        grid-template-columns: 1fr;
        grid-template-areas: "table";
      }
      .panel { display: none; }
    }
  </style>
</head>

<body>

  <!-- Top bar -->
  <div class="app-topbar">
    <button class="icon-btn" type="button" title="بحث">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>

    <button class="icon-btn" type="button" title="تحديث" id="refreshBtn">
      <i class="fa-solid fa-rotate-right"></i>
    </button>

    <div class="title">سند قبض</div>

    <button class="icon-btn" type="button" title="خروج">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>
  </div>

  <div class="app">

    <!-- Table -->
    <div class="table-wrap">
      <table class="vouchers">
        <thead>
          <tr>
            <th style="width: 220px;">اسم المستأجر</th>
            <th style="width: 220px;">اسم المالك</th>
            <th style="width: 260px;">عنوان العقار</th>
            <th style="width: 180px;">قيمة القسط</th>
            <th class="t-action">قبض</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>محمد حسن</td>
            <td>السيد حسن</td>
            <td>التجمع الثالث</td>
            <td>12000</td>
            <td class="t-action"><i class="fa-regular fa-square-plus"></i></td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Right panel -->
    <div class="panel">
      <div class="panel-head">
        <div class="icon"><i class="fa-solid fa-sack-dollar"></i></div>
        <p class="panel-title">سند قبض</p>
      </div>

      <div class="mb-2">
        <label class="form-label">اسم المستأجر</label>
        <input class="form-control" type="text" placeholder="اسم المستأجر">
      </div>

      <div class="mb-2">
        <label class="form-label">اسم المالك</label>
        <input class="form-control" type="text" placeholder="اسم المالك">
      </div>

      <div class="mb-2">
        <label class="form-label">التاريخ</label>
        <input class="form-control" type="date">
      </div>

      <div class="mb-2">
        <label class="form-label">قيمة القسط</label>
        <input style="direction: rtl;" class="form-control" type="number" placeholder="قيمة القسط">
      </div>

      <div class="mb-2">
        <label class="form-label">الإيجار من</label>
        <input class="form-control" type="date" placeholder="الإيجار من">
      </div>

      <div class="mb-2">
        <label class="form-label">الإيجار إلى</label>
        <input class="form-control" type="date" placeholder="الإيجار إلى">
      </div>

      <button class="btn-save" type="button">
        <i class="fa-solid fa-left-long"></i>
        تسجيل البيانات
      </button>
    </div>

  </div>

  <script>
    document.getElementById("refreshBtn").addEventListener("click", () => location.reload());
  </script>

</body>
</html>
